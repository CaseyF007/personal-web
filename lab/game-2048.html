<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 — Casey 工具箱</title>
  <meta name="description" content="经典 2048 数字合并游戏">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="icon" href="../assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/lab.css">
</head>
<body>
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a class="nav-logo" href="../index.html">Casey</a>
      <ul class="nav-links" id="nav-links">
        <li><a href="../index.html">首页</a></li>
        <li><a href="../index.html#about">关于</a></li>
        <li><a href="../index.html#projects">项目</a></li>
        <li><a href="../blog.html">博客</a></li>
        <li><a href="../lab.html" class="active">工具箱</a></li>
        <li><a href="../index.html#contact">联系</a></li>
      </ul>
      <div class="nav-right">
        <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">
          <span class="theme-icon">🌙</span>
        </button>
        <button class="nav-toggle" id="nav-toggle" aria-label="打开菜单">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <main class="tool-page">
    <div class="container">
      <div class="tool-breadcrumb">
        <a href="../lab.html">🧰 工具箱</a><span>/</span><span>2048</span>
      </div>

      <div class="game-container">
        <div class="game-info">
          <div class="game-score">
            <div class="game-score-label">分数</div>
            <div class="game-score-value" id="score">0</div>
          </div>
          <div class="game-score">
            <div class="game-score-label">最高分</div>
            <div class="game-score-value" id="best-score">0</div>
          </div>
          <button class="btn btn-outline btn-sm" id="btn-restart" type="button">重新开始</button>
        </div>

        <div style="position: relative;">
          <div class="grid-2048" id="grid-2048">
            <!-- 16 个格子由 JS 生成 -->
          </div>
          <div class="game-overlay" id="game-over-overlay">
            <h2>Game Over!</h2>
            <p style="color: var(--text-secondary);">最终得分: <span id="final-score">0</span></p>
            <button class="btn btn-primary btn-sm" id="btn-restart-overlay" type="button">再来一局</button>
          </div>
        </div>

        <p style="color: var(--text-tertiary); font-size: var(--fs-sm); text-align: center;">
          使用 ← ↑ → ↓ 方向键 或 触摸滑动操作
        </p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Casey. All rights reserved.</p>
        <p style="font-family: var(--font-mono); font-size: var(--fs-xs);">Code is cheap. Show me the prompt.</p>
      </div>
    </div>
  </footer>
  <button class="back-to-top" id="back-to-top" aria-label="回到顶部">↑</button>
  <script src="../js/game-2048.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
