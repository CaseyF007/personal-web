<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">

  <meta name="theme-color" content="#0a0e1a">
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/sections.css">
  <link rel="stylesheet" href="css/blog.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a class="nav-logo" href="index.html">Casey</a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="index.html#about">关于</a></li>
        <li><a href="index.html#projects">项目</a></li>
        <li><a href="blog.html" class="active">博客</a></li>
        <li><a href="lab.html">工具箱</a></li>
        <li><a href="index.html#contact">联系</a></li>
      </ul>
      <div class="nav-right">
        <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">
          <span class="theme-icon">🌙</span>
        </button>
        <button class="nav-toggle" id="nav-toggle" aria-label="打开菜单">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Blog Header -->
  <header class="blog-header">
    <div class="container">
      <h1 class="reveal">技术博客</h1>
      <p class="reveal">记录学习、思考与实践</p>
    </div>
  </header>

  <!-- Tag Filters -->
  <div class="blog-tag-filters" id="blog-tag-filters">
    <div class="container" style="display:flex; justify-content:center; flex-wrap:wrap; gap:0.5rem;">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Blog List -->
  <main class="blog-list">
    <div class="container">
      <div class="blog-grid stagger-children" id="blog-grid">
        <!-- Populated by JS -->
      </div>
      <div id="blog-empty" style="display:none; text-align:center; padding: 4rem 0;">
        <p style="color: var(--text-tertiary); font-size: var(--fs-lg);">暂无文章</p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Casey. All rights reserved.</p>
        <p style="font-family: var(--font-mono); font-size: var(--fs-xs);">Code is cheap. Show me your prompt.</p>
      </div>
    </div>
  </footer>

  <button class="back-to-top" id="back-to-top" aria-label="回到顶部">↑</button>

  <script src="js/blog.js"></script>
  <script src="js/main.js"></script>

</html>
